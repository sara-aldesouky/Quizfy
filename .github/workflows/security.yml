name: Security Guardrails

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run secret guardrail scan
        run: python scripts/security_scan.py --root .

